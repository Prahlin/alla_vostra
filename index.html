<!--page redirected to MOB or COMP depending on the device used-->

<script type="text/javascript" language="javascript">

  if( /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ) {
    //redirect user if using mobile
    window.location="http://allavostra.com/mob/index.html";
  } else {
    //redirect user if not using mobile
    window.location="http://allavostra.com/other/index.html";
  }
</script>

</html>
