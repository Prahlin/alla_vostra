<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alla Vostra | Contact</title>

  <link rel="stylesheet" href="assets/css/shared.css" />
</head>

<body>
  <div id="site-header"></div>
  <script src="assets/js/header.js"></script>

  <main class="page-main contact-main">
    <h1 class="page-title">Let&apos;s Get In Touch</h1>
    <div class="page-divider"></div>

    <section class="contact-intro">
      <p>Got a business inquiry?</p>
      <p>General questions about our products?</p>
      <p>We strive to respond within 48 hours</p>
    </section>

    <section class="contact-card">
      <form
        class="contact-form"
        action="https://api.web3forms.com/submit"
        method="POST"
        id="form"
      >
        <input
          type="hidden"
          name="access_key"
          value="56ada6fc-1731-4865-b0bf-7792b452ea44"
        />
        <input
          type="hidden"
          name="subject"
          value="New Web3Forms Submission For Alla Vostra"
        />
        <input
          type="checkbox"
          name="botcheck"
          style="display: none;"
          tabindex="-1"
          autocomplete="off"
        />

        <div class="form-row">
          <label for="name">Full Name</label>
          <input
            type="text"
            name="name"
            id="name"
            placeholder="John Doe"
            required
          />
        </div>

        <div class="form-row">
          <label for="email">Email Address</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="you@company.com"
            required
          />
        </div>

        <div class="form-row">
          <label for="phone">Phone Number</label>
          <input
            type="text"
            name="phone"
            id="phone"
            placeholder="+1 (555) 1234-567"
            required
          />
        </div>

        <div class="form-row message-row">
          <label for="message">Your Message</label>
          <textarea
            name="message"
            id="message"
            placeholder="Your Message"
            required
          ></textarea>
        </div>

        <button class="contact-submit" type="submit">
          Send Message
        </button>

        <p id="result"></p>
      </form>
    </section>
  </main>
</body>
</html>
