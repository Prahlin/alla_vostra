<script>

const parallax =
  document.querySelector(".parallax");

const navbar =
  document.getElementById("indexTable");

let frozen = false;

function updateFreeze() {

  if (!parallax || !navbar) return;

  const navbarRect =
    navbar.getBoundingClientRect();

  const navbarBottom =
    navbarRect.bottom;

  /*
    freeze exactly when navbar
    leaves viewport
  */

  if (navbarBottom <= 0 && !frozen) {

    frozen = true;

    /*
      capture current visible state
    */

    const rect =
      parallax.getBoundingClientRect();

    /*
      permanently pin hero/banner
    */

    parallax.style.position = "fixed";

    parallax.style.top =
      rect.top + "px";

    parallax.style.left =
      rect.left + "px";

    parallax.style.width =
      rect.width + "px";

    parallax.style.height =
      rect.height + "px";

    parallax.style.margin = "0";

    parallax.style.zIndex = "1";

    parallax.style.pointerEvents =
      "none";

    /*
      freeze all transforms
    */

    parallax
      .querySelectorAll("*")
      .forEach(el => {

        const computed =
          getComputedStyle(el).transform;

        if (
          computed &&
          computed !== "none"
        ) {
          el.style.transform =
            computed;
        }

      });

    parallax.classList.add("frozen");

  }

}

/*
  disable ALL further animations/transitions
*/

const style =
  document.createElement("style");

style.innerHTML = `

.parallax.frozen *,
.parallax.frozen svg,
.parallax.frozen div {

  animation: none !important;

  transition: none !important;

  will-change: auto !important;

}

`;

document.head.appendChild(style);

/*
  monitor scrolling
*/

window.addEventListener(
  "scroll",
  updateFreeze,
  { passive: true }
);

/*
  original autoscroll behavior
*/

window.addEventListener("click", () => {

  window.scrollTo({
    top: 450,
    behavior: "smooth",
  });

});

</script>
